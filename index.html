<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids WhatsApp</title>
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Kids WhatsApp">
      <nav class="rail" aria-label="Primary">
        <button class="rail-button active" data-section="chats" title="Chats" aria-label="Chats">
          <span class="badge">8</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H7l-3 3V5Zm4 4h8v2H8V9Zm0 4h6v2H8v-2Z"/></svg>
        </button>
        <button class="rail-button" data-section="friends" title="Friends &amp; Invites" aria-label="Friends and Invites">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Zm8.5 1a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7ZM2 20a6 6 0 0 1 12 0v1H2v-1Zm12.6 1a7.9 7.9 0 0 0-2.1-5.3A5 5 0 0 1 22 18v3h-7.4Z"/></svg>
        </button>
        <div class="rail-spacer"></div>
        <button class="rail-button" data-section="settings" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m19.4 13.5.1-1.5-.1-1.5 2-1.55-2-3.46-2.45 1a8 8 0 0 0-2.6-1.5L14 2.4h-4l-.35 2.6a8 8 0 0 0-2.6 1.5l-2.45-1-2 3.46 2 1.55L4.5 12l.1 1.5-2 1.55 2 3.46 2.45-1a8 8 0 0 0 2.6 1.5l.35 2.6h4l.35-2.6a8 8 0 0 0 2.6-1.5l2.45 1 2-3.46-2-1.55ZM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/></svg>
        </button>
        <div class="profile" title="Profile">KW</div>
      </nav>

      <aside class="sidebar">
        <section class="panel chats-panel" data-panel="chats">
          <header class="panel-header">
            <h1>Kids WhatsApp</h1>
            <div class="signed-in-user" aria-live="polite"></div>
            <div class="header-actions">
              <button title="Friends &amp; Invites" aria-label="Friends and Invites" data-jump-section="friends">+</button>
            </div>
          </header>
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 4a5.5 5.5 0 0 1 4.38 8.83l4.15 4.14-1.06 1.06-4.14-4.15A5.5 5.5 0 1 1 9.5 4Zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg>
            <input id="searchInput" type="search" placeholder="Search friends" />
          </label>
          <div class="filters" aria-label="Chat filters">
            <button class="filter active" data-filter="all">All</button>
            <button class="filter" data-filter="unread">Unread</button>
            <button class="filter" data-filter="groups">Groups</button>
          </div>
          <div class="notice safe-notice" data-notice>
            <strong>Safe chat only.</strong>
            <span>Text and voice calls with trusted friends.</span>
            <button aria-label="Dismiss notice">x</button>
          </div>
          <div id="chatList" class="list" aria-label="Chats"></div>
        </section>

        <section class="panel friends-panel hidden" data-panel="friends">
          <header class="panel-header">
            <h1>Friends &amp; Invites</h1>
          </header>
          <div class="friends-scroll" data-friends-invites></div>
        </section>

        <section class="panel settings-panel hidden" data-panel="settings">
          <header class="panel-header">
            <h1>Settings</h1>
          </header>
          <label class="search-box settings-search">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.5 4a5.5 5.5 0 0 1 4.38 8.83l4.15 4.14-1.06 1.06-4.14-4.15A5.5 5.5 0 1 1 9.5 4Zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg>
            <input type="search" placeholder="Search settings" />
          </label>
          <div class="settings-scroll"></div>
        </section>
      </aside>

      <section class="content" data-content="chats">
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-illustration">KW</div>
          <h2>Kids WhatsApp</h2>
          <p>Choose a friend and start a kind conversation.</p>
          <small>Safe chat for kids.</small>
        </div>
        <article id="conversation" class="conversation"></article>
      </section>
    </main>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
